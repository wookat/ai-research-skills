<!-- header v3 — centered title + single equal-height logo strip (the finalized
     design). Root keeps class="titlebar" + data-section="title" so the banner
     fallback role, the narration ring (.titlebar[data-section="title"]), and the
     canvas controller all keep working. Self-contained: ships its own <style>.
     THEME CONTRACT — the header reads --tb-* vars; the SOLID look is the baked
     default, so styles/solid.css needs no header overrides. framed.css / simple.css
     re-theme by setting --tb-bg / --tb-fg / --tb-title-fg / --tb-border / … in :root.
     PLACEHOLDERS: {{TITLE}} {{AUTHORS}} {{AUTHOR_LEGEND}} {{CONTACT}}
       {{VENUE_NAME}} {{VENUE_YEAR}} {{VENUE_LOGO}} (assets/logos/_venue.png)
       {{LOGO_1}}..{{LOGO_6}} (institution logos; works for 2–6 — empties auto-hide). -->
<style>
  .titlebar {
    flex: 0 0 auto;
    position: relative;
    background: var(--tb-bg, var(--accent));
    color: var(--tb-fg, #ffffff);
    border: var(--tb-border, none);
    border-radius: var(--tb-radius, 12pt);
    box-shadow: var(--tb-shadow, 0 3px 12px rgba(0, 0, 0, 0.18));
    padding: 30pt 56pt 26pt;
  }
  /* v3: title block centered, equal-height logo strip below */
  .titlebar.hv-3 { display: block; text-align: center; }
  .titlebar .title-block { min-width: 0; }
  .titlebar h1 {
    margin: 0 0 0.22em 0;
    font-size: 92pt;
    line-height: 1.1;
    letter-spacing: -0.01em;
    font-weight: 800;
    color: var(--tb-title-fg, #ffffff);
  }
  .titlebar .authors { font-size: 44pt; line-height: 1.3; color: var(--tb-fg, #ffffff); }
  .titlebar .author-legend {
    margin-top: 0.16em;
    font-size: 30pt;
    letter-spacing: 0.02em;
    color: var(--tb-sub-fg, rgba(255, 255, 255, 0.82));
  }
  .titlebar .author-legend:empty { display: none; }
  .titlebar .authors sup,
  .titlebar .author-legend sup,
  .titlebar .contact sup { font-size: 0.62em; vertical-align: super; line-height: 0; }
  /* Contact line hidden by default — the † on the author already marks who to
     contact; the email eats titlebar height that belongs to the columns. */
  .titlebar .contact { display: none; }

  /* Equal-height logo strip: conference mark (slightly larger) + a divider +
     the institution logos, all on white chips so dark/colored marks read on the
     accent fill. Wraps to a 2nd row gracefully when there are many institutes. */
  .titlebar .strip {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 16pt 20pt;
    margin-top: 22pt;
  }
  .titlebar .strip .chip {
    background: var(--tb-chip-bg, #ffffff);
    border-radius: 8pt;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 150pt;
    padding: 10pt 20pt;
    box-shadow: var(--tb-chip-shadow, 0 2px 8px rgba(0, 0, 0, 0.18));
  }
  .titlebar .strip .chip img {
    height: 122pt;
    width: auto;
    max-width: 380pt;
    object-fit: contain;
    display: block;
  }
  /* Conference chip dominates a touch (one venue vs many institutes). */
  .titlebar .strip .chip.conf { height: 160pt; }
  .titlebar .strip .chip.conf img { height: 134pt; max-width: 480pt; }
  /* Venue TEXT fallback. The venue logo (assets/logos/_venue.png) is often
     absent — Wikidata rarely has conference logos — so VENUE_LOGO is filled with
     "" in that case. Hide the <img> when its src is empty / unfilled / 404'd
     (onerror also drops it), and show the VENUE / YEAR text in the same chip so
     the strip never shows an empty box AND preflight never sees a dead image. */
  .titlebar .strip .chip.conf img[src=""],
  .titlebar .strip .chip.conf img:not([src]),
  .titlebar .strip .chip.conf img[src*="{{"] { display: none; }
  .titlebar .strip .chip.conf .vtext {
    display: none;
    font-size: 60pt;
    font-weight: 800;
    letter-spacing: 0.01em;
    white-space: nowrap;
    color: var(--tb-conf-fg, var(--accent));
  }
  .titlebar .strip .chip.conf:not(:has(img[src]:not([src=""]):not([src*="{{"]))) .vtext { display: inline; }
  /* Auto-hide an institution chip whose logo never resolved (placeholder left
     unfilled, or empty src). The onerror handler also drops it on a 404. */
  .titlebar .strip .chip:has(img[src=""]),
  .titlebar .strip .chip:has(img[src*="{{"]) { display: none; }
  .titlebar .strip .divider {
    width: 2px;
    height: 124pt;
    background: var(--tb-divider, rgba(255, 255, 255, 0.45));
    margin: 0 6pt;
  }
  /* Full-Listen pill: hidden unless body.show-listen (matches the section
     Listen pills). Out of flow so show/hide never reflows the title. */
  .titlebar .listen-all {
    position: absolute;
    bottom: 22pt;
    left: 56pt;
    z-index: 5;
    font-size: 28pt;
    font-weight: 600;
    color: var(--tb-fg, #ffffff);
    background: transparent;
    border: 1.5pt solid currentColor;
    border-radius: 999px;
    padding: 6pt 20pt;
    cursor: pointer;
  }
</style>

<header class="titlebar hv-3" data-section="title" data-header="v3">
  <div class="title-block" data-section="title">
    <h1>{{TITLE}}</h1>
    <div class="authors">{{AUTHORS}}</div>
    <div class="author-legend">{{AUTHOR_LEGEND}}</div>
    <div class="contact">{{CONTACT}}</div>
  </div>
  <div class="strip" data-section="logos">
    <span class="chip conf" data-venue="{{VENUE_NAME}} {{VENUE_YEAR}}">
      <img src="{{VENUE_LOGO}}" alt="" onerror="this.remove()">
      <span class="vtext">{{VENUE_NAME}} {{VENUE_YEAR}}</span>
    </span>
    <span class="divider"></span>
    <span class="chip"><img src="{{LOGO_1}}" alt="" onerror="this.closest('.chip').remove()"></span>
    <span class="chip"><img src="{{LOGO_2}}" alt="" onerror="this.closest('.chip').remove()"></span>
    <span class="chip"><img src="{{LOGO_3}}" alt="" onerror="this.closest('.chip').remove()"></span>
    <span class="chip"><img src="{{LOGO_4}}" alt="" onerror="this.closest('.chip').remove()"></span>
    <span class="chip"><img src="{{LOGO_5}}" alt="" onerror="this.closest('.chip').remove()"></span>
    <span class="chip"><img src="{{LOGO_6}}" alt="" onerror="this.closest('.chip').remove()"></span>
  </div>
  <button class="listen-all" data-listen-all>Full Listen</button>
</header>
