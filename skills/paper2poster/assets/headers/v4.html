<!-- header v4 — title (LEFT) · venue + institution logos (RIGHT).
     A common GT poster layout: left-aligned title block, a right mark-stack with
     the conference chip above the institution logos. Root keeps class="titlebar" +
     data-section="title". Self-contained <style>; --tb-* theme contract; SOLID look
     is the baked default. PLACEHOLDERS: {{TITLE}} {{AUTHORS}} {{AUTHOR_LEGEND}}
     {{CONTACT}} {{VENUE_NAME}} {{VENUE_YEAR}} {{VENUE_LOGO}} {{LOGO_1}}..{{LOGO_6}}. -->
<style>
  .titlebar {
    flex: 0 0 auto;
    position: relative;
    background: var(--tb-bg, var(--accent));
    color: var(--tb-fg, #ffffff);
    border: var(--tb-border, none);
    border-radius: var(--tb-radius, 12pt);
    box-shadow: var(--tb-shadow, 0 3px 12px rgba(0, 0, 0, 0.18));
    padding: 30pt 56pt;
  }
  /* v4: title left, mark-stack right. align-items:stretch -> the right stack is as
     tall as the title block; space-evenly spreads venue (top) + logos (bottom) to
     fill that height. */
  .titlebar.hv-4 {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: stretch;
    gap: 52pt;
  }
  .titlebar .title-block { min-width: 0; text-align: left; }
  .titlebar h1 {
    margin: 0 0 0.22em 0;
    font-size: 88pt;
    line-height: 1.08;
    letter-spacing: -0.01em;
    font-weight: 800;
    color: var(--tb-title-fg, #ffffff);
  }
  .titlebar .authors { font-size: 42pt; line-height: 1.3; color: var(--tb-fg, #ffffff); }
  .titlebar .author-legend {
    margin-top: 0.16em;
    font-size: 28pt;
    letter-spacing: 0.02em;
    color: var(--tb-sub-fg, rgba(255, 255, 255, 0.82));
  }
  .titlebar .author-legend:empty { display: none; }
  .titlebar .authors sup,
  .titlebar .author-legend sup,
  .titlebar .contact sup { font-size: 0.62em; vertical-align: super; line-height: 0; }
  .titlebar .contact { display: none; }

  /* RIGHT marks: conference chip STACKED ABOVE the institution logos, so the
     logo zone gets the FULL height of the right column (which stretches to the
     title). That tall 2D box lets fit_logos pack the marks into MULTIPLE rows
     and grow them to fill -- a single short strip could only fit one tiny row. */
  .titlebar .right-marks {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-start;
    gap: 24pt;
    min-height: 0;
  }
  .titlebar .right-marks > .chip.conf { flex: 0 0 auto; }   /* venue stays compact on top */
  .titlebar .chip {
    background: var(--tb-chip-bg, #ffffff);
    border-radius: 8pt;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--tb-chip-shadow, 0 2px 8px rgba(0, 0, 0, 0.18));
  }
  .titlebar .chip.conf { max-height: 156pt; padding: 12pt 24pt; min-width: 5em; }
  /* An EMPTY venue chip (no conf logo AND no venue text -- common for preprints)
     must NOT reserve space, or it steals the top half of the header and squashes
     the institution logos into the lower (author) band. Collapse it so the
     logo-grid below spans the FULL header height. */
  .titlebar .chip.conf:not(:has(img[src]:not([src=""]):not([src*="{{"]))):not(:has(.vtext:not(:empty))) { display: none !important; }
  .titlebar .chip.conf img { height: 128pt; width: auto; max-width: 420pt; object-fit: contain; display: block; }
  /* Venue TEXT fallback (assets/logos/_venue.png often absent -> VENUE_LOGO=""). */
  .titlebar .chip.conf img[src=""],
  .titlebar .chip.conf img:not([src]),
  .titlebar .chip.conf img[src*="{{"] { display: none; }
  .titlebar .chip.conf .vtext {
    display: none;
    font-size: 58pt;
    font-weight: 800;
    letter-spacing: 0.01em;
    white-space: nowrap;
    color: var(--tb-conf-fg, var(--accent));
  }
  .titlebar .chip.conf:not(:has(img[src]:not([src=""]):not([src*="{{"]))) .vtext { display: inline; }
  .titlebar .logo-grid {
    flex: 1 1 auto;              /* fill the right column's remaining height -> tall
                                   multi-row box for fit_logos (below the venue chip) */
    min-height: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
    align-content: center;
    gap: 12pt 16pt;
    max-width: 1400pt;
  }
  .titlebar .logo-grid .chip { height: 124pt; padding: 8pt 16pt; }
  .titlebar .logo-grid .chip img { height: 120pt; width: auto; max-width: 260pt; object-fit: contain; display: block; }
  /* (Header QR tiles removed — v1-v4 never show a titlebar QR; it lives in the Scan-to-Read section. Only v5 has a header QR.) */
  .titlebar .logo-grid .chip:has(img[src=""]),
  .titlebar .logo-grid .chip:has(img[src*="{{"]) { display: none; }

  .titlebar .listen-all {
    position: absolute;
    bottom: 16pt;
    left: 56pt;
    z-index: 5;
    font-size: 26pt;
    font-weight: 600;
    color: var(--tb-fg, #ffffff);
    background: transparent;
    border: 1.5pt solid currentColor;
    border-radius: 999px;
    padding: 5pt 18pt;
    cursor: pointer;
  }
</style>

<header class="titlebar hv-4" data-section="title" data-header="v4">
  <div class="title-block" data-section="title">
    <h1>{{TITLE}}</h1>
    <div class="authors">{{AUTHORS}}</div>
    <div class="author-legend">{{AUTHOR_LEGEND}}</div>
    <div class="contact">{{CONTACT}}</div>
  </div>
  <div class="right-marks" data-section="venue-logo">
    <span class="chip conf">
      <img src="{{VENUE_LOGO}}" alt="" onerror="this.remove()">
      <span class="vtext">{{VENUE_NAME}} {{VENUE_YEAR}}</span>
    </span>
    <div class="logo-grid" data-section="inst-logos">
      <span class="chip"><img src="{{LOGO_1}}" alt="" onerror="this.closest('.chip').remove()"></span>
      <span class="chip"><img src="{{LOGO_2}}" alt="" onerror="this.closest('.chip').remove()"></span>
      <span class="chip"><img src="{{LOGO_3}}" alt="" onerror="this.closest('.chip').remove()"></span>
      <span class="chip"><img src="{{LOGO_4}}" alt="" onerror="this.closest('.chip').remove()"></span>
      <span class="chip"><img src="{{LOGO_5}}" alt="" onerror="this.closest('.chip').remove()"></span>
      <span class="chip"><img src="{{LOGO_6}}" alt="" onerror="this.closest('.chip').remove()"></span>
      <!-- v1-v4 carry NO header QR: the QR always renders in the standalone scan-to-read section. Only v5 keeps a titlebar QR. -->
    </div>
  </div>
  <button class="listen-all" data-listen-all>Full Listen</button>
</header>
