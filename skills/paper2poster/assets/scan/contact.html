<style>
  /* Scan-to-Read variant: CONTACT — "Questions? Get in touch" heading + corresponding-author
     email on the LEFT, one QR on the RIGHT at full section height. Shared invariants repeated
     so the partial is self-contained. */
  .section[data-section="scan-to-read"] h2 { position: static !important; transform: none !important; background: none !important; max-width: none !important; display: block; margin: 0; padding: 0; }
  .section[data-section="scan-to-read"] .qr-img { background-color: #fff; background-size: contain; background-repeat: no-repeat; background-position: center; background-origin: content-box; padding: 8pt; border: 1px solid #e5e5e0; border-radius: 9pt; image-rendering: pixelated; aspect-ratio: 1 / 1; }
  .section[data-section="scan-to-read"] .tq[data-qr=""],
  .section[data-section="scan-to-read"] .tq[data-qr*="{{"] { display: none !important; }
  .section[data-section="scan-to-read"]:not(:has(.tq:not([data-qr=""]):not([data-qr*="{{"]))) { display: none; }
  body:has(.titlebar img.qr-img[src]:not([src=""]):not([src*="{{"])) .section[data-section="scan-to-read"],
  body:has(.titlebar .qr-tile .chip.qr img[src]:not([src=""]):not([src*="{{"])) .section[data-section="scan-to-read"] { display: none; }
  /* contact layout */
  .section[data-section="scan-to-read"] .scan-contact-v { display: flex; flex-direction: row; align-items: stretch; justify-content: flex-start; flex: 1 1 auto; min-height: 0; gap: 30pt; }
  .section[data-section="scan-to-read"] .scan-contact-v .scan-aside { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 14pt; }
  .section[data-section="scan-to-read"] .scan-contact-v h2 { font-size: 40pt; line-height: 1.05; color: var(--accent); }
  .section[data-section="scan-to-read"] .scan-contact-v .scan-contact { font-size: 26pt; line-height: 1.4; color: var(--muted); word-break: break-word; }
  .section[data-section="scan-to-read"] .scan-contact-v .scan-contact:empty { display: none; }
  .section[data-section="scan-to-read"] .scan-contact-v .tq { flex: 0 0 auto; align-self: stretch; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8pt; min-height: 0; }
  .section[data-section="scan-to-read"] .scan-contact-v .qr-img { height: 290pt; max-height: 100%; width: auto; }
  .section[data-section="scan-to-read"] .scan-contact-v .tq span { font-size: 26pt; font-weight: 600; color: var(--muted); }

  /* --- shared scan polish (posterskill-inspired: QR card depth + accent caption pill) --- */
  .section[data-section="scan-to-read"] .qr-img { border-radius: 13pt !important; box-shadow: 0 4pt 16pt rgba(0,0,0,0.15); border-color: rgba(0,0,0,0.06); padding: 10pt !important; }
  .section[data-section="scan-to-read"] .tq { gap: 12pt !important; }
  .section[data-section="scan-to-read"] .tq span { background: var(--accent-soft); color: var(--accent) !important; font-weight: 800 !important; padding: 4pt 17pt; border-radius: 999pt; letter-spacing: 0.02em; }
</style>
<div class="section" data-section="scan-to-read">
  <div class="scan-qr scan-contact-v">
    <div class="scan-aside">
      <h2>Questions? Get in touch</h2>
      <div class="scan-contact">{{CONTACT}}</div>
    </div>
    <div class="tq" data-qr="{{QR_PAPER}}"><div class="qr-img" style="background-image:url('{{QR_PAPER}}')"></div><span>Paper</span></div>
  </div>
</div>
